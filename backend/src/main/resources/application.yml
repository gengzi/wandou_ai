server:
  port: 8080

spring:
  application:
    name: wandou-ai-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wandou_ai}
    username: ${SPRING_DATASOURCE_USERNAME:wandou}
    password: ${SPRING_DATASOURCE_PASSWORD:wandou_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: 604800
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-read-cookie: false
  is-log: false

wandou:
  ai:
    provider:
      type: mock
    agent:
      monitor:
        enabled: ${WANDOU_AI_AGENT_MONITOR_ENABLED:true}
        sse-enabled: ${WANDOU_AI_AGENT_MONITOR_SSE_ENABLED:true}
        min-publish-interval-ms: ${WANDOU_AI_AGENT_MONITOR_MIN_PUBLISH_INTERVAL_MS:1000}
    video:
      provider: ${WANDOU_AI_VIDEO_PROVIDER:mock}
    storage:
      type: ${WANDOU_AI_STORAGE_TYPE:minio}
      minio:
        endpoint: ${WANDOU_AI_MINIO_ENDPOINT:http://localhost:9000}
        access-key: ${WANDOU_AI_MINIO_ACCESS_KEY:wandouminio}
        secret-key: ${WANDOU_AI_MINIO_SECRET_KEY:wandouminio123}
        bucket: ${WANDOU_AI_MINIO_BUCKET:wandou-assets}
        public-base-url: ${WANDOU_AI_MINIO_PUBLIC_BASE_URL:http://localhost:9000}
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info
