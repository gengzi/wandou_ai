spring:
  datasource:
    url: jdbc:h2:mem:wandou_ai_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

wandou:
  ai:
    video:
      provider: mock
    storage:
      type: fake
    cors:
      allowed-origins:
        - http://localhost:3001
        - http://localhost:5173

sa-token:
  is-log: false
