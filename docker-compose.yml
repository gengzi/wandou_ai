services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: wandou-ai-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wandou_ai}
      POSTGRES_USER: ${POSTGRES_USER:-wandou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wandou_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - wandou-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 12

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: wandou-ai-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wandouminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wandouminio123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - wandou-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ./backend
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre}
    container_name: wandou-ai-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-wandou_ai}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-wandou}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-wandou_dev}
      WANDOU_AI_CORS_ALLOWED_ORIGINS: http://localhost:${WEB_PORT:-3001},http://127.0.0.1:${WEB_PORT:-3001}
      WANDOU_AI_STORAGE_TYPE: minio
      WANDOU_AI_MINIO_ENDPOINT: http://minio:9000
      WANDOU_AI_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-wandouminio}
      WANDOU_AI_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-wandouminio123}
      WANDOU_AI_MINIO_BUCKET: ${MINIO_BUCKET:-wandou-assets}
      WANDOU_AI_MINIO_PUBLIC_BASE_URL: ${WANDOU_AI_MINIO_PUBLIC_BASE_URL:-http://localhost:${MINIO_API_PORT:-9000}}
      WANDOU_AI_VIDEO_PROVIDER: ${WANDOU_AI_VIDEO_PROVIDER:-mock}
      WANDOU_AI_SILICONFLOW_API_KEY: ${WANDOU_AI_SILICONFLOW_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  web:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: wandou-ai-web
    environment:
      BACKEND_URL: http://backend:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_URL: http://localhost:${WEB_PORT:-3001}
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  wandou-postgres-data:
  wandou-minio-data:
