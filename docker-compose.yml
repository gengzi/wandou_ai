services:
  backend:
    build:
      context: ./backend
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: wandou-ai-backend
    environment:
      WANDOU_AI_CORS_ALLOWED_ORIGINS: http://localhost:${WEB_PORT:-3001},http://127.0.0.1:${WEB_PORT:-3001}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  web:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8080}
    container_name: wandou-ai-web
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_URL: http://localhost:${WEB_PORT:-3001}
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 12
